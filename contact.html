      integrity="sha256-46qynGAkLSFpVbEBog43gvNhfrOj+BmwXdxFgVK/Kvc="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" href="assets/css/styles.css" />

    <title>Contact</title>
  </head>

  <body>
    <header class="primary-header text-center">
      <!-- <div class="logo">
            <img src="assets/images/logo.png" alt="">
        </div> -->
      <!-- <button class="nav-toggle" aria-label="toggle navigation">

        </button> -->
      <!-- <div id="navbar-placeholder"></div> -->
      <nav class="primary-navigation">
        <ul role="list" class="nav__list">
          <li class="nav__item"><a href="index.html">About Me</a></li>
          <li class="nav__item">
            <a href="assets/docs/NickMorrow_Resume_2025.pdf" target="_blank">Resume</a>

          <li class="nav__item"><a href="projects.html">Projects</a></li>
          <li class="nav__item"><a href="contact.html">Contact Me</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <form
        class="cntctForm"
        method="POST"
        action="https://script.google.com/macros/s/AKfycbwrMmZitFXV7NsCpvcj-30LVH9_Knhq08G6pyjzFKSIRmg8uhNoF0Iem6zjSriZo405/exec"
      >
        <div class="form-elements">
          <fieldset>
            <label for="name">Name: </label>
            <input id="name" name="name" placeholder="Your preferred professional name" required />
          </fieldset>

          <fieldset>
            <label for="message">Message: </label>
            <textarea
              id="message"
              name="message"
              rows="10"
              placeholder="What are you contacting me about..."
              required
            ></textarea>
          </fieldset>

          <fieldset>
            <label for="email">Email Address:</label>
            <input id="email" name="email" type="email" value="" placeholder="yourEmail@email.com" required />
            <span class="email-invalid">Must be a valid email address</span>
          </fieldset>

          <!-- Submit -->
          <button>Send</button>
        </div>

        <!-- Thank You! -->
        <div class="thankyou_message">
          <h2><em>Thank you</em> for contacting me!<br />I will get back to you soon!</h2>
        </div>
      </form>
    </main>

    <!-- Javascript -->
